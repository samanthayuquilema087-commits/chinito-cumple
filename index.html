<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para ti, mi Chinito 💜</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div id="stars"></div>

<div class="overlay"></div>

<div class="container">

<h1>

Para ti,<br>

<span>mi Chinito 💜</span>

</h1>

<p class="texto">

Hoy es un día muy especial... ✨<br>

y quería hacerlo aún más bonito para ti.

</p>

<div class="sobre" id="sobre">

<div class="tapa"></div>

<div class="carta">

💌

</div>

</div>

<button id="abrir">

💜 Abrir mi carta

</button>

<div id="mensaje" class="oculto">

<h2>

Feliz Cumpleaños ❤️

</h2>

<p id="typing"></p>

<div class="botones">

<button id="especial">

🐈 ¿Por qué eres especial?

</button>

<button id="amor">

❤️ Lo que siento por ti

</button>

<button id="final">

🎁 Última sorpresa

</button>

</div>

</div>

<audio id="musica" loop>

<source src="musica.mp3" type="audio/mpeg">

</audio>

<button id="playMusic" class="music">

🎵

</button>

</div>

<script src="script.js"></script>

</body>

</html>
