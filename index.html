<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para ti, mi Chinito 💜</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div id="stars"></div>

<div class="overlay"></div>

<div class="container">

<div class="inicio">

<p class="frase">

🐞 Ladybug encontró a su Chat Noir. 💜

</p>

<h1>

Para el niño que<br>

cambió mi mundo... 💜

</h1>

<div class="linea"></div>

<p class="texto">

Hay personas que llegan para cambiar tu mundo...<br>

y tú cambiaste el mío. ✨

</p>

<button id="entrar">

✨ Entrar ✨

</button>

</div>
  <h2 class="tituloCarta">

💌 Un mensaje para ti...

</h2>
<div class="sobre" id="sobre">

<div class="tapa"></div>

<div class="carta">

💌

</div>

</div>

<button id="abrir">

💜 Abrir mi carta

</button>

<div id="mensaje" class="oculto">

<h2>

Feliz Cumpleaños ❤️

</h2>

<p id="typing"></p>

<div class="botones">

<button id="especial">

🐈 ¿Por qué eres especial?

</button>

<button id="amor">

❤️ Lo que siento por ti

</button>

<button id="final">

🎁 Última sorpresa

</button>

</div>

</div>

<audio id="musica" loop>

<source src="musica.mp3" type="audio/mpeg">

</audio>

<button id="playMusic" class="music">

🎵

</button>

</div>

<script src="script.js"></script>
